body:
  text: 敦煌本壇經校釋疏義第七章執筆者周芳研讀班集體討論經文一正文五祖平旦遂喚盧供奉來南廊下畫楞伽變五祖忽見此偈讀訖乃謂供奉曰弘忍與供奉錢三十千深勞遠來不畫變相也金剛經云凡所有相皆是虛妄不如留此偈令迷人誦依此修行不墮三惡依法修行有大利益大師遂喚門人盡來焚香偈前眾人見已皆生敬心汝等盡誦此偈者方得見性依此修行即不墮落門人盡誦皆生敬心喚言善哉五祖遂喚秀上座於堂內門是汝作偈否若是汝作應得我法秀上座言罪過實是神秀作不敢求祖願和尚慈悲看弟子有少智惠識大意否五祖曰汝作此偈見解衹到門前尚未得入凡夫依此偈修行即不墮落作此見解若覓無上菩提即不可得須入得門見自本性汝且去一兩日來思惟更作一偈來呈吾若入得門見自本性當付汝衣法秀上座去數日作偈不得二校記並諸家錄校復議五祖平旦遂喚盧供奉來南廊下畫楞伽變喚斯本作換據敦博本改孟本潘本據敦博本改周本李申本李富華本楊本鄧遼本中島本黃本徑錄作喚復議周本李申本李富華本楊本鄧遼本中島本黃本失校不妥伽斯本作拁枷據敦博本改諸錄校本均徑作伽復議諸本失校不妥五祖忽見此偈讀訖讀訖斯本敦博本均作請記據文意改孟本徑改作讀訖周本潘本鄧遼本中島本黃本或理校或依據其他錄校本改作讀訖李申本李富華本楊本徑錄作請記復議原文請記文意不通顯然有誤諸錄校本大都認為應為讀訖因形近而誤寫成請記這一觀點可以成立在敦煌本壇經中可以找到旁證北殘片有今既發四弘誓願訖這句話在斯本中亦作今既發四弘誓願訖但在敦博本中卻作今既發四弘誓願說也是因為字形相近誤訖為說相比之下記字字形更加接近訖孟本徑改不妥李申本李富華本楊本在沒有文本依據的情況下徑錄作請記亦為處理方法之一種李富華本楊本沒有出校說明此處文意不通不妥乃謂供奉曰弘忍與供奉錢三十千深勞遠來不畫變相也與斯本敦博本均作与據文意改孟本周本楊本潘本黃本徑改作與鄧遼本中島本徑錄作与李申本李富華本為簡體本不議復議與為正規的繁體字故以與字為正金剛經云凡所有相皆是虛妄復議無不如留此偈令迷人誦留斯本作流據敦博本改孟本李申本潘本黃本據敦博本校作留出校記周本李富華本楊本鄧遼本中島本徑錄作留復議周本李富華本楊本鄧遼本中島本失校不妥依此修行不墮三惡依法修行有大利益三惡斯本敦博本同孟本李申本鄧遼本黃本錄作三惡周本中島本理校作三惡道李富華本徑改作三惡道楊本據惠昕本補道字潘本據興聖寺本補道字復議三惡即三惡道之省稱周本中島本理校補充不妥楊本潘本據非敦博本校改不妥李富華本徑改尤為不妥有斯本作人有據敦博本刪孟本潘本徑錄作人有周本李富華本楊本鄧遼本中島本黃本徑錄作有李申本據敦博本校作有復議此處有無人字文意不變孟本潘本周本李富華本楊本鄧遼本中島本黃本失校不妥大師遂喚門人盡來焚香偈前復議無眾人見已皆生敬心眾人見已斯本作人眾入見其中入字字形似人敦博本作眾人見已孟本潘本據斯本錄文並理校改人為入周本李富華本楊本鄧遼本中島本黃本徑錄作眾人見已李申本錄作眾人見已出校說明斯本行文復議敦煌遺書人入不分孟本潘本理校成立且斯本人眾入見之入書寫雖似人字與前一個人字字形尚有差距捺筆起頭較高從文意看眾人見已人眾入見在此兩俱可通校釋疏義此處採用敦博本行文周本李富華本楊本鄧遼本中島本黃本失校不妥汝等盡誦此偈者方得見性依此修行即不墮落李富華本楊本於汝前擬補大師曰黃本則擬補弘忍曰其餘諸校本照錄原文復議從上下文意看這段話衹能是弘忍所說此外採用適當標點也可以表明這是一段弘忍所說的話因此完全沒有必要在沒有文本基礎的情況下另補文字李富華本楊本黃本擬補不妥性斯本作姓據敦博本改性姓兩字為敦煌本壇經常見互用字諸本對此處理不一復議同前此處不贅依斯本作於據敦博本改依於兩字為敦煌本壇經常見互用字諸本對此處理不一復議同前此處不贅門人盡誦皆生敬心喚言善哉復議無五祖遂喚秀上座於堂內門是汝作偈否若是汝作應得我法祖斯本作楬據敦博本改潘本孟本據敦博本校作祖其餘諸本徑錄作祖復議此處楬屬於敦煌遺書中常見的俗寫筆畫增減錯變寫字可徑改出校更好門斯本敦博本同孟本稱據興聖寺本校作間周本楊本中島本理校作問李申本錄作門李富華本徑改作問潘本據興聖寺本校作問鄧遼本黃本據惠昕本理校作問復議兩個敦煌本均作門細審上下文五祖遂喚秀上座於堂內門文亦可通且與下文弘忍所說汝作此偈見解衹到門前尚未得入相呼應又敦煌本壇經共出現問字餘處句式均為問或問未見將問單獨作為意群故此處以門意為長潘本認為敦煌俗寫門問通用但缺乏例證孟本誤讀興聖寺本尤為不妥周本楊本中島本理校有誤不妥李富華本徑改且錯尤為不妥潘本鄧遼本黃本據非敦煌本理校不妥我斯本敦博本均同諸本均錄作我楊本徑改作吾復議楊本擅改原文不妥秀上座言罪過實是神秀作座敦博本脫據斯本補孟本李富華本潘本中島本徑補座周本李申本楊本鄧遼本黃本據斯本補座復議孟本李富華本潘本中島本徑補不妥不敢求祖祖敦博本作但據斯本改孟本李申本潘本鄧遼本黃本據斯本改周本中島本徑錄作但下屬李富華本徑補祖位二字但字下屬楊本據惠昕本補祖位二字但字下屬復議這裏的問題在於此字到底如斯本作祖上屬與求連成求祖還是如敦博本作但下屬與願連成但願孟本李申本潘本鄧遼本黃本採取前者周本中島本採取後者這個問題放在下文探討楊本據非敦煌本補校不妥李富華本徑補尤為不妥願和尚慈悲看弟子有少智惠識大意否少斯本作小據敦博本改孟本徑錄作小周本李富華本楊本鄧遼本中島本徑錄作少李申本據敦博本校作少潘本據斯本校作小黃本亦據斯本校作小但校記有誤復議小少此處相通兩俱可用孟本周本李富華本楊本鄧遼本中島本失校不妥惠斯本敦博本同惠諸錄校本或作慧惠慧兩字此處兩俱可通復議同前此處不贅五祖曰汝作此偈見解衹到門前尚未得入祖參見校記見解斯本作見即來到據敦博本改孟本據斯本校作見即來到周本李富華本楊本鄧遼本中島本徑作見解李申本黃本據敦博本校作見解潘本徑作見即來到復議見即來到字面意思為見解即使已經來到亦即解悟的境地即使已經被觸摸到故斯本文字全句意思與敦博本相同神秀的見解尚不究竟圓滿雖然斯本敦博本兩種文字均可通但斯本行文略嫌晦澀不如敦博本明曉故校釋疏義採用敦博本行文周本李富華本楊本鄧遼本中島本潘本失校不妥凡夫依此偈修行即不墮落作此見解若覓無上菩提即不可得依斯本作於據敦博本改依於兩字為敦煌本壇經常見互用字諸本對此處理不一復議同前此處不贅不斯本作未據敦博本改孟本據斯本校作未周本李富華本楊本中島本徑作不李申本鄧遼本黃本據敦博本校作不潘本徑作未復議此處不未兩俱可通周本李富華本楊本中島本潘本失校不妥須入得門見自本性須敦博本作要據斯本改孟本潘本據斯本校作須周本李富華本楊本中島本黃本徑錄作要李申本據敦博本校作要鄧遼本理校作要須復議此處須要兩俱可通就語感而言似須意為長周本李富華本楊本中島本黃本失校不妥鄧遼本疊牀架屋不妥自斯本作白據敦博本改自白兩字為敦煌本壇經常見互用字諸本對此處理不一復議同前此處不贅性斯本作姓據敦博本改性姓兩字為敦煌本壇經常見互用字諸本對此處理不一復議同前此處不贅汝且去一兩日來思惟更作一偈來呈吾且斯本敦博本同諸本均錄作且潘本校記錯認作旦新書錄作且來敦博本無據斯本補孟本李申本潘本鄧遼本黃本據斯本補來周本李富華本楊本中島本據敦博本徑錄復議此處有無來字兩俱可通但斯本之來字體現當時口語於意為長周本李富華本楊本中島本失校不妥若入得門見自本性當付汝衣法見敦博本脫據斯本補孟本周本李申本楊本潘本鄧遼本中島本黃本據斯本校補見李富華本徑補見復議李富華本徑補不妥自斯本作白據敦博本改自白兩字為敦煌本壇經常見互用字諸本對此處理不一復議同前此處不贅性斯本作姓據敦博本改性姓兩字為敦煌本壇經常見互用字諸本對此處理不一復議同前此處不贅秀上座去數日作偈不得偈斯本脫據敦博本補孟本潘本據斯本校錄周本李富華本楊本鄧遼本中島本黃本據敦博本徑錄李申本據敦博本校補復議此處有無偈字無礙文意理解但以有偈文意為長周本李富華本楊本鄧遼本中島本黃本失校不妥三注釋平旦旦指早晨平旦是早晨天剛亮的時候半夜到天亮分為三階段分別是鷄鳴昧旦和平旦供奉供奉是唐代的一種官名常在皇帝左右供職這裏或指該畫師曾任供奉詳情待考三惡三惡是三惡道之略稱三惡道指地獄道餓鬼道和畜生道利益佛教所謂的利益並非世俗指稱的好處而是指益世利生的功德其中又包含了出世的無相功德與入世的有相功德弘忍此處所指應是兼有兩種功德墮落墮落指在道德品行修行境遇方面的退步這裏特指墮落到三惡道罪過罪過本義為罪行或過失在此為神秀的謙辭亦即愧不敢當見解見解一般指對某件事物的認識這裏特指對禪法實證體悟的深淺程度無上菩提菩提梵文為意譯為覺即覺悟之義菩提有三等聲聞緣覺佛陀但唯有佛陀所悟所證稱為無上菩提亦即至高無上的佛果四分段標點復議一分段本章敘述神秀撰寫偈頌後弘忍的反應對話較多校釋疏義依據情節的發展及對話將本章分為七段諸校本分段情況各異孟本潘本中島本將連同本章全文合作一段周本亦分七段除一處與校釋疏義略有不同外其餘相同此外李申本分五段李富華本分四段楊本分五段鄧遼本分八段黃本分四段分段的不同凸顯的是整理者對本章文字語感的差異從總體來說不妨礙文字的理解但孟本潘本中島本將連同本章全文合作一段顯得綱目不甚清晰二分句及標點諸錄校本對本章分句標點情況各異這裏僅就其中若干句子進行討論周本中島本將上述兩句合作一句其餘諸本均分作兩句從行文看從五祖擬畫變相到發現神秀偈頌以後決定不畫變相文意有較大轉折還是分為兩句為妥周本鄧遼本為楞伽變打上書名號不妥其餘諸本分句標點雖有不同但都無礙文意理解故不復議諸本分句標點雖有不同都無礙文意理解故不復議本句是弘忍對神秀的問話原文如下五祖遂喚秀上座於堂內門是汝作偈否若是汝作應得我法諸本標點的最大差異是對門字的理解除李申本認讀作門故將該字上聯之外其他諸本均校改為問大都將它獨立為一個意群校釋疏義認為既然兩個敦煌本均作門且文意可通應該尊重原文這三句形成一段是神秀對弘忍的回答校釋疏義校訂錄文如下秀上座言罪過實是神秀作不敢求祖願和尚慈悲看弟子有少智惠識大意否上文第一句神秀坦承偈頌是自己寫的第二句表明心跡無意求祖與第五章的敘述相呼應第三句希望得到弘忍的印可三句話三層含義語意嚴密環環相扣因此校釋疏義將它分作三句合為一段這裏的關鍵是上文祖字斯本雖作祖敦博本卻作但於是諸錄校本出現三種處理方法孟本李申本潘本鄧遼本黃本據斯本校作祖標點雖然不盡相同由此形成語感的差異但錄文則與上文相同周本中島本據敦博本徑錄作但下屬錄文為秀上座言罪過實是神秀作不敢求但願和尚慈悲看弟子有少智惠識大意否把祖校改為但與下文的願合成但願一詞下文即含義不變然而之不敢求祖卻變成不敢求缺少賓語出現語意不清的問題前面提到弘忍的徵求偈頌有傳法選接班人兩重含義如為不敢求祖則神秀這裏的意思很清楚他題寫偈頌的目的不是指望覓祖而僅僅衹是求法如為不敢求則意義含混語義不順也許是考慮到據敦博本校作但會產生上述問題於是楊本李富華本參考後代壇經本在不敢求後面補上祖位二字成為秀上座言罪過實是神秀作不敢求祖位但願和尚慈悲看弟子有少智慧識大意否與校釋疏義錄文比較標點略有不同所表達的內容完全一樣既然用敦煌本本身就可以解決問題為什麼要採用後代的非敦煌資料來擅改敦煌本的文字呢楊本李富華本的做法顯然不能讓人認同追究其原因可能是楊本李富華本過於信任敦博本的文字而沒有對所謂劣本斯本的文字作深入的思考諸本分句標點雖有不同但都無礙文意理解故不復議五疏義第五章已經交待弘忍欲畫楞伽變本章承接上文先交待弘忍讓畫家來到南廊下準備畫楞伽變但弘忍見到壁上神秀的偈頌立即改變了主意寧肯白白奉送畫家三萬錢作為辛苦費以留下偈頌不再畫楞伽變弘忍為何改變主意按照壇經這時的敘述似乎弘忍非常欣賞神秀的這首偈頌認為按照這首偈頌闡述的道理修行可以不墮三惡道有大利益而楞伽變不過是一種虛妄之相而已弘忍引金剛經文凡所有相皆是虛妄與楞伽變相比神秀偈頌的價值更大所以放棄楞伽變留下偈頌不僅如此弘忍還把門人都叫來在神秀偈頌前焚香禮拜稱念誦這首偈頌不但可以不墮落還可以見性見性是禪宗僧人修持的最高目標既然神秀的偈頌可以幫助達成這樣的目標難怪弘忍要讓大家焚香禮拜但這衹是一種表面現象看來弘忍心中不但完全明白這首偈頌是誰寫的而且非常準確地掌握了神秀的心態他把神秀叫來當面詢問並明確表示如果這首偈頌是你寫的應得我法壇經在第五章中曾詳細描寫過神秀當時的矛盾心態以及最終的決定即如果偈頌寫得好弘忍尋找作者自己便出面認賬如果偈頌被弘忍批評自己便不出頭現在事態的發展與神秀的第一種設想完全相符於是他痛痛快快承認偈頌是自己寫的但表明自己並不是想覓祖衹是想求法然而事情到此出現戲劇性的轉折弘忍忽然改變了態度他本來在大庭廣眾之中稱頌這首偈頌可以見性本來當面向神秀明確表態應得我法這時卻說你現在的認識衹來到大門口即還沒有真正入門沒有登堂入室一般的凡夫按照你的認識去修行可以不墮三惡道但修行者卻不可能靠它覺悟成佛弘忍進一步指出要得入門纔能見性他要神秀重新再作一個偈頌如果能夠真正入門見性纔能傳授衣法這一轉折完全出於神秀的意料之外壇經說神秀沉悶了好幾天寫不出新的偈頌敦煌本壇經這種戲劇性的描寫以及對神秀先揚後抑揚中有抑的手法為惠能的出場作了極好的鋪墊如何看待壇經的上述敘述如果它記載的的確是歷史的事實那麼弘忍為何要這樣對待神秀這樣處理神秀的偈頌這一事實反映了早期禪宗僧團存在著一種什麼樣的內部生態如果它並非歷史事實那麼壇經為何編造這一故事也許這裏既有歷史事實的影子又有後人的編撰改造那麼真正的歷史事實到底是什麼這些問題都是我們研究早期禪宗史所不可迴避的六原始資料敦博本五祖平旦遂喚盧供奉來南廊下畫楞伽變五祖忽見此偈請記乃謂供奉曰弘忍与供奉錢三十千深勞遠來不畫變相也金剛經云凡所有相皆是虛妄不如留此偈令迷人誦依此修行不墮三惡依法修行有大利益大師遂喚門人盡來焚香偈前眾人見已皆心生敬心汝等盡誦此偈者方得見性依此修行即不墮落門人盡誦皆生敬心喚言善哉五祖遂喚秀上座於堂內門是汝作偈否若是汝作應得我法秀上言罪過實是神秀作不敢求但願和尚慈悲看弟子有少智惠識大意否五祖曰汝作此偈見解衹到門前尚未得入凡夫依此偈修行即不墮落作此見解若覓无上菩提即不可得要入得門見自本性汝且去一兩日思惟更作一偈來呈吾若入得門自本性當付汝衣法秀上座去數日作偈不得斯本五祖平旦遂換盧供奉來南廊下畫楞枷變五祖忽見此偈請記乃謂供奉曰弘忍与供奉錢三十千深勞遠來不畫變相也金剛經云凡所有相皆是虛妄不如流此偈令迷人誦依此修行不墮三惡依法修行人有大利益大師遂喚門人盡來焚香偈前人眾人見皆生敬心汝等盡誦此偈者方得見姓於此修行即不墮落門人盡誦皆生敬心喚言善哉五褐遂喚秀上座於堂內門是汝作偈否若是汝作應得我法秀上座言罪過實是神秀作不敢求祖願和尚慈悲看弟子有小智惠識大意否五褐曰汝作此偈見即來到衹到門前尚未得入凡夫於此偈修行即不墮落作此見解若覓无上菩提即未可得須入得門見自本姓汝且去一兩日來思惟更作一偈來呈吾若入得門自本性當付汝衣法秀上座去數日作不得旅博本綠衍紅漏粉異與斯本比五祖平旦遂喚盧供奉來南廊下畫楞枷變五祖忽見此偈請記乃謂供奉曰弘忍与供奉錢三十千深勞遠來不畫變相也金剛經云凡所有相皆是虛妄不如留此偈令迷人誦依此修行不墮三惡依法修行人有大利益大師遂喚門人盡來焚香偈前人眾人見皆生敬心汝等盡誦此偈者方得見姓依此修行即不墮落門人盡誦皆生敬心喚言善哉五祖遂喚秀上座於堂內門是汝作偈否若是汝作應得我法秀上座言罪過實是神秀作不敢求祖願和尚慈悲看弟子有小智惠識大意否五祖曰汝作此偈見即來到只到門前尚未得入凡夫依此偈修行即不墮落作此見解若覓无上菩提即未可得須入得門見自本姓汝且去一兩日來思惟更作一偈來呈吾若入得門見自本性當付汝衣法秀上座去數日作不得方廣錩修改審定
