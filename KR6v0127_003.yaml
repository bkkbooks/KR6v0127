body:
  text: 敦煌本壇經校釋疏義第八章執筆者曾曉紅研讀班集體討論經文一正文有一童子於碓坊邊過唱誦此偈惠能一聞知未見性即識大意能問童子適來誦者是何言偈童子答能曰你不知大師言生死事大欲傳衣法令門人等各作一偈來呈吾看悟大意即付衣法稟為六代祖有一上座名神秀忽於南廊下書無相偈一首五祖令諸門人盡誦悟此偈者即見自性依此修行即得出離惠能答曰我此踏碓八個餘月未至堂前望上人引惠能至南廊下見此偈禮拜亦願誦取結來生緣願生佛地童子引能至南廊下能即禮拜此偈為不識字請一人讀惠能聞已即識大意惠能亦作一偈又請得一解書人於西間壁上題著呈自本心不識本心學法無益識心見性即吾大意惠能偈曰菩提本無樹明鏡亦無臺佛性常清淨何處有塵埃又偈曰心是菩提樹身為明鏡臺明鏡本清淨何處染塵埃院內徒眾見能作此偈盡怪惠能卻入碓坊二校記並諸家錄校復議有一童子於碓坊邊過唱誦此偈唱敦博本作此據斯本改孟本周本李申本楊本潘本鄧遼本中島本黃本據斯本校作唱李富華本唱此均無亦無校記復議李富華本失校漏字尤為不妥惠能一聞知未見性即識大意一聞敦博本作及一聞據斯本刪孟本李申本鄧遼本黃本據斯本刪及周本李富華本楊本中島本據敦博本徑錄作及一聞潘本據斯本徑錄作一聞復議此處多一及字並不影響句意此及字可視為衍文也可能是當時的口語周本李富華本楊本中島本潘本失校不妥性斯本作姓據敦博本改性姓兩字為敦煌本壇經常見互用字諸本對此處理不一復議同前此處不贅能問童子適來誦者是何言偈言敦博本斯本同孟本周本李申本潘本鄧遼本中島本黃本均錄作言李富華本無楊本據惠昕本刪復議原文是何言偈文從字順李富華本徑改尤為不妥楊本據非敦煌資料擅改且錯不妥童子答能曰你不知大師言生死事大欲傳衣法令門人等各作一偈來呈吾看悟大意即付衣法稟為六代祖你敦博本斯本同周本李申本李富華本楊本鄧遼本中島本黃本作你孟本作潘本校記錄為作出校記說明斯本作你正文校作你復議孟本排版錯誤尤為不妥潘本校記有誤不妥事斯本作是據敦博本改孟本李申本潘本據敦博本校作事周本李富華本楊本鄧遼本中島本黃本徑錄作事復議周本李富華本楊本鄧遼本中島本黃本失校不妥衣斯本作於據敦博本改孟本李申本潘本鄧遼本據敦博本校作衣周本李富華本楊本中島本黃本徑錄作衣復議周本李富華本楊本中島本黃本失校不妥吾斯本無據敦博本錄孟本潘本據斯本徑錄周本李富華本楊本鄧遼本中島本黃本據敦博本徑錄李申本據敦博本校補吾復議孟本潘本失校且錯尤為不妥周本李富華本楊本鄧遼本中島本黃本失校不妥悟敦博本作吾據斯本改孟本潘本據斯本徑錄作悟周本李申本楊本鄧遼本黃本據斯本校作悟中島本理校作悟李富華本徑改作悟復議孟本潘本失校不妥李富華本徑改尤為不妥祖斯本作褐據敦博本改孟本潘本據敦博本校作祖周本李申本李富華本楊本鄧遼本中島本黃本徑錄作祖復議周本李申本李富華本楊本鄧遼本中島本黃本失校不妥有一上座名神秀忽於南廊下書無相偈一首復議無五祖令諸門人盡誦祖斯本原作褐校改為祖敦博本作祖諸本均作祖孟本校記稱斯本作褐據敦博本校作祖復議孟本辨字有誤不妥悟此偈者即見自性依此修行即得出離性斯本作姓據敦博本改性姓兩字為敦煌本壇經常見互用字諸本對此處理不一復議同前此處不贅惠能答曰我此踏碓八個餘月未至堂前復議無望上人引惠能至南廊下見此偈禮拜亦願誦取結來生緣願生佛地復議無童子引能至南廊下下敦博本無據斯本補孟本潘本徑錄下周本李申本楊本鄧遼本黃本據斯本補下中島本理校補下李富華本無下復議孟本潘本失校不妥李富華本失校且錯尤為不妥能即禮拜此偈為不識字請一人讀惠能聞已即識大意能斯本無據敦博本補孟本李申本潘本據敦博本補能周本李富華楊本鄧遼本中島本黃本徑補能復議周本李富華楊本鄧遼本中島本黃本失校不妥聞斯本作問據敦博本改孟本李申本潘本據敦博本校作聞周本李富華本楊本鄧遼本中島本黃本徑錄作聞復議周本李富華本楊本鄧遼本中島本黃本失校不妥惠能亦作一偈又請得一解書人於西間壁上題著呈自本心題斯本作提據敦博本改孟本潘本據敦博本校作題周本李申本李富華本楊本鄧遼本中島本黃本徑錄作題復議周本李申本李富華本楊本鄧遼本中島本黃本失校不妥不識本心學法無益識心見性即吾大意性斯本作姓據敦博本改性姓兩字為敦煌本壇經常見互用字諸本對此處理不一復議同前此處不贅吾敦博本斯本同孟本據閻校本校作悟周本錄作吾李申本李富華本黃本徑錄作悟楊本中島本理校作悟潘本錄作悟出校記認為敦煌俗寫吾悟通用吾當作悟並指出敦博本吾作悟鄧遼本參西夏本鈴木校本錄作悟復議此處兩個敦煌本均作吾且文意可通如改為悟則文意全變故不可擅改孟本鄧遼本據其他材料改敦煌本且錯不妥李申本李富華本黃本徑改尤為不妥楊本潘本中島本理校有誤不妥惠能偈曰菩提本無樹明鏡亦無臺佛性常清淨何處有塵埃性斯本作姓據敦博本改性姓兩字為敦煌本壇經常見互用字諸本對此處理不一復議同前此處不贅清斯本作青據敦博本改孟本潘本據敦博本校作清周本李申本李富華本楊本鄧遼本中島本黃本徑錄作清復議周本李申本李富華本楊本鄧遼本中島本黃本失校不妥有敦博本斯本同諸本均錄作有李申本徑改作染復議李申本徑改尤為不妥又偈曰心是菩提樹身為明鏡臺明鏡本清淨何處染塵埃為敦博本斯本同諸本均錄作為周本中島本徑改作是復議周本中島本徑改尤為不妥心是菩提樹身為明鏡臺敦博本斯本同孟本周本李申本李富華本楊本潘本中島本錄文均依照原文將心菩提樹身明鏡臺相互對舉鄧遼本黃本則依據陳寅恪禪宗六祖傳法偈之分析等資料錄作身是菩提樹心為明鏡臺復議陳寅恪觀點有誤鄧遼本黃本擅改原文且錯尤為不妥院內徒眾見能作此偈盡怪徒斯本作從據敦博本改孟本周本李申本李富華本楊本鄧遼本中島本黃本徑錄作徒潘本據敦博本校作徒復議孟本周本李申本李富華本楊本鄧遼本中島本黃本失校不妥惠能卻入碓坊復議無三注釋無相偈無相原意指無形相為有相之對稱佛教認為諸法緣起性空無自性亦無形相可得故稱無相因此無相是佛教修持者應努力把握的境地此處童子用無相偈來稱呼神秀的偈頌是一種美稱出離據佛光大辭典出離條超出脫離之意即離迷界出生死輪回之苦而成辦佛道以達於解脫之境亦即出離三界之牢獄了脫惑業之繫縛故一般有出離三界出離生死出離得道之慣用語這裏指出離生死而證涅槃上人指上德之人本意是對智德兼備而可為眾僧及眾人師者之高僧的尊稱因比丘內涵德智外有勝行在人之上後來成為對一般比丘的尊稱惠能其時在寺院的身份是行者童子大約是出家的沙彌故此處是在家行者對出家沙彌的尊稱佛地據三藏法數佛地條佛梵語具云佛陀華言覺謂佛有大功德力資利智慧而與一念相應觀真諦究竟習氣亦究竟覺果圓滿故名佛地據佛地經論卷一具一切智一切種智離煩惱障及所知障於一切法一切種相能自開覺亦能開覺一切有情如睡夢覺如蓮華開故名為佛地地謂所依所行所攝即當所說清淨法界大圓鏡智平等性智妙觀察智成所作智受用和合一味事等是佛所依所行所攝故名佛地這裏指佛所達到的清淨法界的地位本心這裏指眾生本來具足的真如心性即佛性四分段標點復議一分段本章敘述惠能得知神秀偈頌後的表現校釋疏義依據情節發展與對話分作九段詳見正文部分諸校本共有六種不同的分段法具體情況如下孟本潘本分為四段為第一段分別為第二第三段從起到第九章首部止合為第四段周本李富華本楊本分為七段為第一段為第二段為第三段為第四段分別為第五第六段為第七段李申本分為六段為第一段為第二段為第三段分別為第四第五段為第六段鄧遼本也分為九段但與校釋疏義不同為第一段為第二段為第三段為第四段為第五段為第六段分別為第七第八段為第九段中島本分為三段到為第一段為第二段從起到第九章首部止合為第三段黃本也分六段但與李申本不同為第一段為第二段為第三段分別為第四第五段從起到第九章首部止合為第六段以上六種分段法連同校釋疏義對本章共計出現七種分段法校釋疏義分段主要考慮人物的轉換兼及偈頌的表達及事後交待此外李申本大體以地點變換為分段依據兼及偈頌的表達及事後交待也是可以考慮的一種分段法其他分段法各有自己的考慮衹要不妨礙文意的理解也可以並存但有兩個問題應該作辨析孟本潘本黃本將及第九章首部之合為一段這種分段法恐怕欠妥敘述弘忍見到惠能偈頌的反應應把這段文字與弘忍其後的一系列表現綜合分析文字如下惠能亦作一偈又請得一解書人於西間壁上題著呈自本心不識本心學法無益識心見性即吾大意應該怎樣理解這段文字周本鄧遼本把其中呈自本心不識本心學法無益識心見性即吾大意作為惠能的書壁文字之一是否正確這個問題又涉及到分句與標點擬在下文分析二分句及標點本章的分句與標點諸錄校本處理多有不同為避文繁在此主要考察分句與標點差異較大的等五句對於這一句校釋疏義標點如下童子答能曰你不知大師言生死事大欲傳衣法令門人等各作一偈來呈吾看悟大意即付衣法稟為六代祖上句除了開頭的述語童子答能曰之外均為童子的語言你不知為領起下面即是童子所說惠能不知道的具體內容具體內容分兩部分第一部分是童子對弘忍的間接引文大師言生死事大欲傳衣法第二部分是述語與直接引文令門人等各作一偈來呈吾看悟大意即付衣法稟為六代祖間接引文不用引號直接引文用引號略去無礙文意理解的標點區別諸本的主要差異在於如何處理直接引文周本李富華本楊本潘本鄧遼本黃本均將大師言以下文字全部處理為間接引文李申本處理方式將直接引文部分加上引號校釋疏義認為各作一偈來呈吾看悟大意即付衣法稟為六代祖一段中有來呈吾看云云顯然衹能作為直接引文處理否則此處之吾究竟指童子還是指五祖從語意上講可能導致混淆李申本的處理比較妥當孟本中島本為日式標點無法區別間接引文或直接引文但孟本將各作一偈來呈吾看悟大意即付衣法稟為六代祖標點為各作一偈來呈看悟大意即付衣法稟為六代祖出現破句錯誤對於這一句校釋疏義標點如下有一上座名神秀忽於南廊下書無相偈一首諸錄校本的爭議主要在於無相偈是否應用書名號諸本處理情況如下周本鄧遼本用書名號李申本李富華本楊本潘本黃本不用書名號孟本中島本為日式標點不復議校釋疏義認為從童子答語看無相偈顯然是對神秀偈頌給予的名稱說明該偈頌當時在弘忍僧團中的聲望與地位因此應該用書名號標註這兩句爭議