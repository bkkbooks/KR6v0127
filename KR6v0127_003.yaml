島本分為二句為一句為一句潘本黃本合為一句如前所述上面這段話是惠能在大梵寺說法時面對諸多聽眾所講所以應該分為二句是惠能追述當年書寫偈頌的情景是惠能面對大梵寺眾多僧俗聽眾對自己心法宗旨的正面標示分為三句割裂了惠能的禪法宗旨合為一句模糊了兩句話的不同背景五疏義本章敘述惠能得知五祖弘忍擬通過公開徵集偈頌的方式選拔接班人並得知了神秀的偈頌他認為神秀的偈頌尚未見性便針鋒相對地創作了自己的偈頌題寫在寺院墻上惠能的偈頌成為惠能得法的契機以下將它稱為得法偈惠能的得法偈是針對神秀的無相偈而作的因此兩者必須對舉研究校釋疏義說明提到上世紀二十年代起曾發現若干西夏文壇經殘片三十年代羅福成曾發表研究論文日本學者也曾經發表過研究成果其後又續有發現現分藏各處計個殘頁有史金波考釋譯文西夏文六祖壇經殘頁譯釋據史金波告訴筆者從紙張筆跡等形態看他考察過的諸殘頁原來均屬同一寫本西夏文壇經是根據漢文壇經翻譯的有的研究者主張它的底本就是敦煌本這一觀點可備一說無論如何在現存諸壇經傳本中西夏文本的年代與流行地域最接近敦煌本行文也最接近敦煌本因此它可以成為我們研究敦煌本壇經時的重要參考資料個殘頁中恰好保存了神秀的無相偈與惠能的得法偈西夏殘本壇經神秀無相偈的內容與斯本敦博本相比完全相同作身是菩提樹心如明鏡臺時時勤拂拭莫使有塵埃而惠能得法偈西夏殘本則作惠能偈曰菩提本無樹明鏡亦非臺佛法常清淨何處有塵埃心是菩提樹身即如明鏡明鏡本清淨如何染塵埃與兩個敦煌本相比西夏本有如下幾點差別將兩首四句偈頌合為一首八句偈頌但這僅是形式上的差別敦煌本的明鏡亦無臺西夏本作明鏡亦非臺無與非雖然都是否定但一個強調沒有一個強調不是意義尚有差異敦煌本的佛性常清淨西夏本作佛法常清淨史金波注稱漢字法性形近原或為法但我以為原偈頌應如敦煌本為性也許正因為法性形近造成西夏本的譯者誤看或者西夏本譯者所依據的漢文本此處錯抄為法敦煌本的身為明鏡臺西夏本作身即明鏡臺語氣雖有不同意義其實一致可置而不論敦煌本的何處染塵埃西夏本作如何染塵埃聯繫上下文意義其實相同但西夏本語意似乎更精到綜上所述西夏本與敦煌本所述惠能得法偈基本相同它們的差異大抵為兩種語文的迻譯所造成無論是無相偈還是得法偈都用譬喻手法寫成如何理解作者使用的這些譬喻手法及其真意成為理解這些偈頌意義的關鍵在神秀的偈頌中首句所謂的身顯然指五蘊色身這應該沒有問題由於樹也是因緣所成所以如果把五蘊色身譬喻為一般的樹應該也沒有問題問題在於佛教為了強調五蘊色身無我脆危可厭無常變遷不可依恃所以常常把它譬喻為中空的芭蕉樹而神秀卻用冬夏不凋光鮮無比的佛教寶樹菩提樹來譬喻五蘊色身他在此想說明什麼呢菩提樹原名畢鉢羅樹由於釋迦牟尼在該樹下覺悟成佛而覺悟在梵文中稱菩提所以該樹被稱為菩提樹並成為佛教的聖樹此外印度佛教早期認為佛已經涅槃無形無象當造像中擬表現釋迦牟尼覺悟成佛這一主題時就雕刻一棵菩提樹由於菩提樹可以譬喻覺悟菩提成佛所以神秀的身是菩提樹句顯然不是指五蘊色身脆危可厭而是指猶如菩提樹代表菩提覺性那樣修行者的肉身也內蘊著佛性所以身是菩提樹這句偈頌正確的讀法應該是身是菩提之樹強調了菩提這一特性亦即強調了人身內蘊的佛性下句心如明鏡臺則正面論述佛性心的意義在佛教中甚為複雜有時等同於心識指在現實世界中活動的人的精神作用有時等同於心性則指本性佛性神秀偈頌中的心是後者這可以在神秀系著作天竺國菩提達摩禪師論中得到印證如言達心門者由常看守心故漸達自心本性清淨不為一切煩惱諸垢之所染污猶如虛空覺心者是覺悟之心即是真佛即是菩提心既指佛性則心如明鏡臺這句偈頌究其本意是指心性象明鏡一樣本體湛然常淨且可觀照萬物所以神秀偈頌第一句講人身內蘊佛性第二句講佛性湛然常淨第三四兩句時時勤拂拭莫使有塵埃則表述了心性本淨客塵所染這一印度部派佛教的古老命題衹是心性本淨客塵所染論述的是心性與客塵的關係而神秀則強調修行者由此必須時時警惕保持其心性湛然清淨的本性不被外界客塵所染各有側重不同由此看來神秀在本質上也是一個佛性論者與惠能並無差異他在偈頌中以菩提樹譬喻身雖然並不符合佛教對身的傳統解義但就其論述的一切眾生皆有佛性的主題而言並無什麼的錯誤但菩提覺悟佛性本身是無形象的而菩提樹是有形象的神秀的這句偈頌有給無形象的菩提賦予形象之嫌而下句的心如明鏡臺卻大有問題雖說神秀這句話的本意是指心如明鏡即指心性像明鏡一樣本體湛然但由於偈頌字數的限制與對仗押韻的需要末尾加了一個臺字這樣全句可緊縮為心如臺也就是說明鏡一詞由原來限定說明主語心的賓語變成了修飾臺的定語而臺卻成了賓語這樣就與神秀的原意大相徑庭也為惠能的反駁留下了契機至於第三四兩句反映了神秀的思想實際也沒有能夠脫出小乘諸惡莫作眾善奉行自淨其意是諸佛教的窠臼難免受到惠能的批評惠能的兩首偈頌都是針對神秀偈頌而作神秀說身是菩提樹主要指人身內蘊佛性對於人身內蘊佛性這個問題惠能並不反對但惠能從另一個角度提出問題菩提本無樹菩提樹明明是一種樹為什麼惠能說菩提本無樹呢從俗諦來說菩提樹是樹這一點惠能與神秀極成沒有疑問但神秀無相偈中的菩提樹並非普通的菩提樹而是菩提之樹是用菩提樹來譬喻菩提如前所說這有給菩提賦予形象之嫌這個漏洞馬上被惠能抓住菩提作為真如佛性本來是無形無象的怎麼能給它賦予形象呢正如後代禪師所說說似一物即不中所以惠能的菩提本無樹並非說菩提樹不是樹而是指責神秀對佛性的認識有偏差如前所述神秀之心如明鏡臺的正確表述應該是心如明鏡指佛性象明鏡那樣湛然常淨但由於末尾多綴了一個臺字於是惠能便抓住這一破綻發起攻擊指出明鏡亦非臺亦即湛然的佛性不可能是什麼臺公平地講佛性無形無象是當時佛教僧人的共識神秀不至於連這點基本知識都沒有衹是因敘述不當出現疏漏從主觀上看神秀的偈頌所表述的主題實際並沒有涉及佛性有無形象的問題但從表述的客觀效果看第一第二兩句的確都可以引申出佛性的形象問題其中第一句用菩提樹來譬喻菩提如果說還衹是依從佛教的傳統習慣還情有可原的話第二句末尾多綴的這個臺字使神秀無法自我辯護衹好低頭認錯身心的關係佛性的有無形象都不是惠能神秀交鋒的要點兩者差別的關鍵在第三第四兩句在神秀看來世界有淨有染要守淨防染而惠能則堅定地維護緣起性空當下即淨神秀是有善有惡有分別而惠能則不思善不思惡超脫分別任運自然神秀要起心看淨惠能則認為執著善惡淨染都是迷人的妄念佛弟子應該於一切法上無有執著佛性本亦無差別衹緣迷悟迷即為愚悟即成智壇經所以神秀無相偈說時時勤拂拭莫使有塵埃而惠能得法偈說佛性常清淨何處有塵埃兩人的境界高下在這裏截然分明如果說惠能的第一首偈頌是專門破斥神秀的觀點則第二首偈頌則借用神秀的偈頌正面闡述自己的觀點心是菩提樹實際是說心是菩提亦即人的心性就其本質來說就是佛性與佛性等同不二由於剝用神秀的原偈頌也由於偈頌體裁的限制惠能在這裏也多綴了一個樹字如果單純地就這句偈頌來講可以說惠能的這句話也犯有與無相偈同樣的毛病但是有了第一首偈頌的菩提本無樹作鋪墊則惠能的這句話就無過了身為明鏡臺講身心關係亦即身衹是明鏡佛性的依託比較而言惠能的說法比神秀的說法要準確得多明鏡本清淨何處染塵埃這兩句與第一首偈頌的後兩句意思完全一樣再次批評了神秀強分染淨的錯誤觀點強調自己的論點如上所述惠能的這兩首偈頌雖是對機而作卻是一個完整的整體先破後立闡述了徹底的一元佛性論的立場後代的壇經修訂者不能真正領會惠能的思想將上述兩首偈頌修改成菩提本無樹明鏡亦非臺本來無一物何處惹塵埃關於這一修訂郭朋曾經提出批評指出就拿為後人所篡改的本來無一物這句偈語來說吧千百年來人們認為這就是惠能的思想其實衹能說它是被誤解了的般若思想而決不能說它是惠能的思想本來無一物未免有惡趣空之嫌我贊同郭朋的上述批評陳寅恪曾經對惠能的上述偈頌提出批評至今引起許多學者的興趣有的表示贊同有的認為惠能讀經不多應該網開一面不能嚴格要求我則認為惠能的偈頌邏輯嚴密無可指責而陳寅恪的批評完全站不住腳陳寅恪的批評集中在三個方面第一惠能第二偈中心身應須互易當是傳寫之誤亦即陳寅恪認為惠能第二首偈頌的心是菩提樹身為明鏡臺原文應該如神秀偈頌一樣是身是菩提樹心如明鏡臺因傳抄致誤或許陳寅恪認為以樹喻心不妥故有是說但如上文所分析的惠能偈頌並沒有錯誤錯誤的是神秀的偈頌所以陳寅恪批評得不對當年陳寅恪得知的敦煌本衹有斯坦因一本現在又出現了敦博本該偈頌文字與斯坦因本相同陳寅恪所謂當是傳寫之誤的推測也缺乏依據楊曾文主張第二首偈頌原是借用神秀的前兩句偈但心身次序似是有意弄顛倒了也肯定原文本身並非傳寫之誤本章的校記並諸家校錄復議提到鄧遼本黃本依據陳寅恪的觀點將得法偈中第二首偈頌的身心互換實際是錯誤的第二此偈之譬喻不適當陳寅恪解釋說菩提樹為永久堅牢之寶樹決不能取以比譬變滅無常之肉身致反乎重心神而輕肉體之教義此所謂譬喻不適當者也如前所述神秀偈頌的著眼點在一切眾生均有佛性著眼點不同取喻亦不同雖然與佛教傳統的解義有異卻也不算大過他的錯誤是敘述不嚴密留下了讓惠能攻擊的漏洞至於惠能的偈頌則完全無過陳寅恪既沒有考察得法偈的真意也沒有考察無相偈的真意率意地先要求把惠能的偈頌中的身心互換也就是把得法偈中的心是菩提樹改為身是菩提樹然後再來批評經過自己互換的身是菩提樹這種譬喻不適當不過大師也是人大師有時也會犯低級錯誤第三此偈之意義未完備陳寅恪解釋說何謂意義未完備細繹偈文其意在身心對舉言身則如樹分析皆空心則如鏡光明普照今偈文關於心之一方面已將譬喻及其本體作用敘述詳盡詞顯而意該身之一方面僅言及譬喻無論其取譬不倫即使比擬適當亦缺少繼續之下文是僅得文意之一半此所謂意義不完備者也這一批評也站不住腳陳寅恪說惠能得法偈意在身心對舉這是誤讀了得法偈因為惠能的偈頌固然涉及了身心關係但這衹是就神秀偈頌的漏洞借題發揮而已他的本意不是論述身心關係而是論述自己的一元佛性論兩首偈頌一共衹有個字強調突出了一元佛性論的基本觀點至於其他問題當然不可能全面深入地論述陳寅恪對惠能得法偈的批評在學術界影響很大就筆者耳目所及贊同者多即使有人想為惠能辯護也從惠能文化程度不高不能苛求之類的角度出發似乎陳寅恪的批評已成不刊之論但是筆者的上述研究證明陳寅恪的三點批評都完全站不住腳就本章的疏義而言惠能下面這段話特別值得引起我們的重視不識本心學法無益識心見性即吾大意在惠能看來佛教八萬四千法門歸根結底要在識心見性上下功夫這是惠能的基本思想也是貫穿整部壇經的基本思想除周本以外的諸多錄校本將吾誤校為悟模糊了惠能說法時開宗明義標揭的這一宗旨非常可惜六原始資料敦博本有一童子於碓坊邊過此誦此偈惠能及一聞知未見性即識大意能問童子適來誦者是何言偈童子答能曰你不知大師言生死事大欲傳衣法令門人等各作一偈來呈吾看吾大意即付衣法稟為六代祖有一上座名神秀忽於南廊下書無相偈一首五祖令諸門人盡誦悟此偈者即見自性依此修行即得出離惠能答曰我此踏碓八個餘月未至堂前望上人引惠能至南廊下見此偈禮拜亦願誦取結來生緣願生佛地童子引能至南廊能即禮拜此偈為不識字請一人讀惠能聞已即識大意惠能亦作一偈又請得一解書人於西間壁上題著呈自本心不識本心學法無益識心見性即吾大意惠能偈曰菩提本無樹明鏡亦無臺佛性常清淨何處有塵埃又偈曰心是菩提樹身為明鏡臺明鏡本清淨何處染塵埃院內徒眾見能作此偈盡怪惠能卻入碓坊斯本有一童子於碓坊邊過唱誦此偈惠能一聞知未見姓即識大意能問童子適來誦者是何言偈童子答能曰你不知大師言生死是大欲傳於法令門人等各作一偈來呈看悟大意即付衣法稟為六代褐有一上座名神秀忽於南廊下書無相偈一首五祖令諸門人盡誦悟此偈者即見白姓依此修行即得出離惠能答曰我此踏碓八個餘月未至堂前望上人引惠能至南廊下見此偈禮拜亦願誦取結來生緣願生佛地童子引能至南廊下能即禮拜此偈為不識字請一人讀惠問已即識大意惠能亦作一偈又請得一解書人於西間壁上提著呈自本心不識本心學法無益識心見姓即吾大意惠能偈曰菩提本無樹明鏡亦無臺佛姓常青淨何處有塵埃又偈曰心是菩提樹身為明鏡臺明鏡本清淨何處染塵埃院內從眾見能作此偈盡怪惠能卻入碓坊旅博本綠衍紅漏粉異與斯本比有一童子於碓坊邊過唱誦此偈惠能一聞知未見姓即識大意能聞童子適來誦者是何言偈童子答能曰你不知大師言生死事大欲傳依法令門人等各作一偈來呈吾看悟大意即付衣法稟為六代祖有一上座名神秀忽於南廊下書無相偈一首五祖令諸門人盡誦悟此偈者即見自姓依此修行即得出離惠能答曰我此踏碓八個餘月未至堂前望上人引惠能至南廊下見此偈禮拜亦願誦取結來生緣願生佛地童子引能至南廊下能即禮拜此偈為不識字請一人讀惠能問已即識大意惠能亦作一偈又請得一解書人於西間壁上題著呈自本心不識本心學法無益識心見姓即悟大意惠能偈曰菩提本無樹明鏡亦無臺佛姓常清淨何處有塵埃又偈曰心是菩提樹身為明鏡臺明鏡本清淨何處染塵埃院內從眾見能作此偈盡怪惠能卻入碓坊方廣錩修改審定
