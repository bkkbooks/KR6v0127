body:
  text: 敦煌本壇經校釋疏義第六章執筆者曹淩研讀班集體討論經文一正文秀上座三更於南廊下中間壁上秉燭題作偈人盡不知偈曰身是菩提樹心如明鏡臺時時勤拂拭莫使有塵埃神秀上座題此偈畢卻歸房臥並無人見二校記並諸家録校復議秀上座三更於南廊下中間壁上秉燭題作偈人盡不知下敦博本無據斯本補孟本徑補下周本李申本潘本鄧遼本黃本據斯本校補下李富華本楊本依敦博本録文未出校記中島本理校補下復議據下文五祖平旦遂喚盧供奉來南廊下畫楞伽變敦博本此處脫下字應據斯本補孟本失校徑補尤為不妥李富華本楊本失校不妥中島本有版本依據而理校不妥秉敦博本作事據斯本改孟本李富華本潘本徑作秉李申本鄧遼本黃本據斯本改周本楊本中島本理校作秉復議孟本李富華本潘本失校不妥周本楊本中島本有版本依據而理校不妥知斯本作和據敦博本改孟本李申本潘本據敦博本改周本李富華本楊本鄧遼本中島本黃本據敦博本録文未出校記復議周本李富華本楊本鄧遼本中島本黃本失校不妥偈曰身是菩提樹心如明鏡臺時時勤拂拭莫使有塵埃拂斯本作佛據敦博本改孟本潘本校作拂周本李申本李富華本楊本鄧遼本中島本黃本據敦博本録文未出校記復議周本李申本李富華本楊本鄧遼本中島本黃本失校不妥神秀上座題此偈畢卻歸房臥並無人見卻斯本無據敦博本補孟本李申本鄧遼本據敦博本補卻周本李富華本楊本中島本黃本據敦博本録文未出校記潘本據斯本録文未出校記復議周本李富華本楊本中島本潘本失校不妥黃本斯本録文有誤故失校不妥三注釋菩提樹此樹原稱鉢多又作貝多阿說他阿沛多意譯為吉祥元吉學名其果實稱畢鉢羅故亦稱畢鉢羅樹屬桑科原産於東印度為常緑喬木高達三公尺以上其葉呈心形而末端尖長花隱於球形花囊中花囊熟時呈暗橙色內藏小果古印度原本流行樹木崇拜佛教認為過去七佛都在某棵樹下成佛釋迦牟尼則在畢鉢羅樹覺悟成佛故稱菩提樹又稱覺樹道樹等此處比喻身是菩提樹是指在身中蘊藏著真如佛性四分段標點復議一分段分句諸録校本均將本章分為三句斷句位置也一致但分段卻有不同共有四種方式孟本潘本將與上文連作一段而將與下文連作一段僅將中間偈頌部分獨立為一段周本李申本鄧遼本將本章之三句作為三段李富華本楊本將與上文連作一段而將作為單獨的兩段中島本黃本將與上文連作一段而將與下文連作一段我們認為第五章敘述神秀的心理活動第六章則敘述神秀打定主意以後的具體行動是祕密寫偈是偈頌內容是歸房休息三句話是三個連貫的舉動合成一個整體因此將這三句話分為三段合作一章較為合適其他各種分段分章法各有千秋但總體來說不妨礙文意的理解二標點本章的標點諸家出入不大即使有出入均屬兩可比較有普遍性的是秀上座三更於南廊下中間壁上秉燭題作偈句其中壁上與秉燭之間是否要用逗號斷開周本潘本中島本黃本未豫斷開而其他諸本皆在此處點斷從文意看兩種點斷方法都不會造成歧義故此一標點問題亦屬兩可五疏義本章文字雖然短小但是包含了神秀的一個偈頌無論歷史上是否真實存在過神秀所寫這一偈頌這一偈頌的確反映了禪宗北宗的基本禪法思想對研究禪宗思想史具有重大參考價值禪宗從創宗開始其基本立場就是一切衆生皆有佛性傳為達摩所撰二入四行論稱深信含生凡聖同一真性這個真性就是佛性這種佛性不僅是一切衆生均皆具有而且是同一的即具有內在的統一性從這一點講人人均可成佛既然如此為什麼有人覺悟成佛有人尚在生死苦海沉淪呢二入四行論認為原因是但為客塵妄覆不能顯了什麼叫客塵這是相對於自性清淨而創立的一個佛教名詞客表示它是外界的外在的與衆生內在的真如佛性是一種相比較相對立的存在佛教認為真如佛性是衆生的本性則客塵是非本性的第二性存在塵表示它是一種與精神性存在相對的物質性的存在所以佛教認為客塵就是無明就是煩惱它本來並非衆生心性中固有的存在因迷理而起故稱為客又以煩惱能污染吾人之心性猶如塵埃之染污萬物故稱為塵但是既然佛性是清淨無染的是無比圓滿的它又怎麼能被客塵污染呢佛性與客塵到底是一種什麼關係呢北宗的文獻楞伽師資記這樣解釋佛性與客塵的關係空中雲霧終不能染污虛空然能翳虛空不得明淨也就是說佛性猶如虛空本身自然清淨無比圓滿不可能被染污但是客塵猶如虛空中的雲霧雲霧雖然不能污染虛空卻可以覆蓋和遮蔽虛空同理客塵可以覆蓋和遮蔽佛性出於這樣一種對佛性與客塵關係的認識北宗主張努力去除客塵的覆蓋和遮蔽以保持佛性湛然自淨的本性然而人生活在三界這一物質性的世界中各種各樣物質性的客塵總是不斷地湧來引誘人蒙蔽人使人産生各種各樣的煩惱所謂心遇外緣煩惱橫起所以一個修持者就應該時時保持警惕守住清淨的本性不要讓它被客塵所染並應該用各種宗教修持的方式把無始以來蒙蔽遮蓋在佛性上的各種顛倒妄想清除掉猶如把虛空中的雲霧統統去除便可以使虛空顯示其清淨本性一樣把煩惱客塵統統除去內在的佛性便可顯示其湛然自淨的本性這就是神秀在本章中所寫偈頌的本意在神秀看來就像菩提樹蘊藏著神性一樣人身廣義地講一切衆生身蘊藏著佛性這佛性像明鏡一樣本體湛然自淨修行者的任務就是要保持明鏡的自淨不要讓它被客塵污染覆蓋具體應該如何保持呢神秀用了時時勤拂拭一句這是一句由上文明鏡而産生的比喻具體到禪宗北宗他們主張凝心入定住心看淨等禪定功夫來防止客塵污染佛性敦煌本壇經神秀偈的末句作莫使有塵埃傳世本則作勿使惹塵埃文字略有差異思想完全不同莫使有塵埃指的是修行者要努力排除客塵的污染不要讓佛性被客塵覆蓋這時的佛性不但湛然自淨而且如如不動但勿使惹塵埃一句所展示的則是一個積極的努力向外體驗向外活動的佛性此時修行者的任務是要控制這個佛性的活動不讓它惹事生非兩句不同的偈頌反映的是兩種截然不同的佛性觀為什麼會有這種差異這是否反映了後代禪宗理論的演變值得我們認真研究但這不屬於校釋疏義的任務在此從略六原始資料敦博本秀上座三更於南廊中間壁上事燭題作偈人盡不知偈曰身是菩提樹心如明鏡臺時時勤拂拭莫使有塵埃神秀上座題此偈畢卻歸房臥並無人見斯本秀上座三更於南廊下中間壁上秉燭題作偈人盡不和偈曰身是菩提樹心如明鏡臺時時勤佛拭莫使有塵埃神秀上座題此偈畢歸房臥並無人見旅博本緑衍紅漏粉異與斯本比秀上座三更於南廊下中間壁上秉燭題作偈人盡不和偈曰身是菩提樹心如明鏡臺時時勤佛拭莫使有塵埃神秀上座題此偈畢歸房臥並無人見方廣錩修改審定
